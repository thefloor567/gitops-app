# gitops-app/.github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'ops-app/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'ops-app/**'

env:
  DOCKERHUB_IMAGE: thefloor123/gitops-app
  CONFIG_REPO: thefloor567/gitops-config
  CONFIG_REPO_PATH: apps/gitops-app/overlays

permissions:
  contents: read

jobs:
  ci:
    name: Build and Push
    runs-on: ubuntu-24.04
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 테스트 실행
        working-directory: ops-app
        run: mvn test -q

      - name: 이미지 태그 생성
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 빌드 및 Push
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t $DOCKERHUB_IMAGE:$IMAGE_TAG .
          docker push $DOCKERHUB_IMAGE:$IMAGE_TAG
          docker tag $DOCKERHUB_IMAGE:$IMAGE_TAG $DOCKERHUB_IMAGE:latest
          docker push $DOCKERHUB_IMAGE:latest
