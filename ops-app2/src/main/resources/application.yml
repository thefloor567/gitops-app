spring:
  application:
    name: ops-app2

server:
  port: 8081

app:
  profile: ${PROFILE:default}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # livenessState:
      #   enabled: true
      # readinessState:
      #   enabled: true
    prometheus:
      access: read_only
  metrics:
    tags:
      application: ${spring.application.name}
      profile: ${app.profile:default}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      # 필요시 SLA 버킷 명시
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 2s, 5s